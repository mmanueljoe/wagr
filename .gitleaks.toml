title = "Wagr gitleaks rules"

# Extends the default gitleaks ruleset and adds project-specific patterns.
[extend]
useDefault = true

[[rules]]
id = "moolre-api-key"
description = "Moolre API credentials (any of the four headers)"
regex = '''(?i)(MOOLRE_API_(USER|KEY|PUBKEY|VASKEY))\s*=\s*['"]?[A-Za-z0-9_\-]{16,}['"]?'''
tags = ["moolre", "credentials"]

[[rules]]
id = "moolre-webhook-secret"
description = "Moolre webhook signing secret"
regex = '''(?i)MOOLRE_WEBHOOK_SECRET\s*=\s*['"]?[A-Za-z0-9_\-]{16,}['"]?'''
tags = ["moolre", "webhook"]

[[rules]]
id = "supabase-service-key"
description = "Supabase service-role key"
regex = '''SUPABASE_SERVICE_KEY\s*=\s*['"]?eyJ[A-Za-z0-9_\-.]+['"]?'''
tags = ["supabase", "credentials"]

[allowlist]
description = "Files that intentionally contain placeholder secrets"
paths = [
  '''\.env\.example$''',
  '''docs/.*\.md$''',
]
