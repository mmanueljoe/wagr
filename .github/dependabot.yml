version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Africa/Accra
    open-pull-requests-limit: 5
    groups:
      dev-deps:
        dependency-type: development
        update-types: [patch, minor]
      prod-patches:
        dependency-type: production
        update-types: [patch]
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
    ignore:
      # Major version bumps are reviewed manually
      - dependency-name: "*"
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions
